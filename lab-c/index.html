<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiktor Poleszczuk 57831 - PTW LAB C</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="styles.css" type="text/css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="" defer></script>
    <script src="https://unpkg.com/leaflet-providers@2.0.0/leaflet-providers.js" defer></script>
    <script src="https://unpkg.com/leaflet-image@0.4.0/leaflet-image.js" defer></script>
    <script src="scripts.js" defer></script>
</head>
<body>
<main class="page-grid">
    <section class="panel">
        <h2>Mapa</h2>
        <div id="map"></div>
        <h3>Sterowanie</h3>
        <div class="controls">
            <button id="getLocation">Get location</button>
            <button id="saveButton">Save Raster Map + Build Puzzle</button>
        </div>
    </section>

    <section class="panel">
        <h2>Raster mapy</h2>
        <canvas id="rasterMap" width="600" height="300"></canvas>
    </section>

    <section class="panel">
        <h2>Puzzle 4x4</h2>
        <div>
            <h3>Pieces (drag from here)</h3>
            <div id="puzzlePieces" class="puzzle-grid puzzle-pieces"></div>
        </div>
    </section>

    <section class="panel">
        <div>
            <h3>Board (drop here)</h3>
            <div id="puzzleBoard" class="puzzle-grid puzzle-board"></div>
        </div>
    </section>
</main>
</body>
</html>
