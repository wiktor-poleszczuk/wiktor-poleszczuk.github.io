<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wiktor Poleszczuk 57831 - PTW LAB C</title>

    <link rel="stylesheet" href="styles.css" type="text/css">
    <script src="scripts.js" defer></script>
</head>
<body>
<div id="container">
    <div id="weather-search-params">
        <h1>Rest Weather</h1>
        <input type="text" value="Szczecin, Poland" id="location-input">
        <button id ="checkButton">Check</button>
    </div>

    <div id="weather-results-container">
        <div class="weather-block">
            <div class="weather-date">23.04.2026</div>
            <div class="weather-temperature">15°C</div>
            <div class="weather-temperature-feels-like">Odczuwalna: 13°C</div>
            <img class="weather-icon" src="https://openweathermap.org/img/wn/04n@2x.png" alt="Weather Icon">
            <div class="weather-description">Częściowo pochmurno</div>
        </div>
    </div>

</div>

</body>
